<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZEEZA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root { --bg: #0a0a0f; --sidebar: #13131f; --card: #1a1a2e; --accent: #10a37f; --text: #ececf1; --border: rgba(255,255,255,0.1); --code: #000; }
    [data-theme="light"] { --bg: #fff; --sidebar: #f7f7f8; --card: #fff; --text: #111; --border: rgba(0,0,0,0.1); --code: #f6f8fa; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
    button { font-family: inherit; color: inherit; cursor: pointer; touch-action: manipulation; }
  .sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  .new-chat { margin: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: none; font-weight: 500; text-align: left; }
  .new-chat:active { background: var(--card); }
  .chat-list { flex: 1; overflow-y: auto; padding: 0 12px; }
  .chat-item { padding: 12px; margin: 4px 0; border-radius: 8px; background: none; border: none; width: 100%; text-align: left; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-item:active,.chat-item.active { background: var(--card); }
  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); font-size: 12px; opacity: 0.6; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 18px; color: var(--accent); }
  .header-btns { display: flex; gap: 8px; }
  .icon-btn { background: var(--card); border: 1px solid var(--border); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .icon-btn:active { opacity: 0.7; }
  .chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; }
  .msg { max-width: 768px; margin: 0 auto; width: 100%; display: flex; gap: 16px; }
  .avatar { width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
  .user.avatar { background: #5436da; }
  .ai.avatar { background: var(--accent); }
  .msg-content { flex: 1; line-height: 1.7; min-width: 0; }
  .msg-content pre { background: var(--code); border-radius: 8px; padding: 16px; overflow-x: auto; margin: 12px 0; position: relative; }
  .msg-content code { font-family: 'JetBrains Mono', monospace; font-size: 14px; }
  .msg-content img { max-width: 100%; border-radius: 12px; margin: 12px 0; }
  .msg-content a { color: var(--accent); }
  .copy-code { position: absolute; top: 8px; right: 8px; background: var(--card); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 12px; }
  .input-area { padding: 24px; border-top: 1px solid var(--border); }
  .input-wrap { max-width: 768px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 16px; display: flex; align-items: end; padding: 12px; gap: 8px; }
  .input-wrap textarea { flex: 1; background: none; border: none; color: var(--text); font-size: 16px; resize: none; max-height: 200px; outline: none; }
  .send-btn { background: var(--accent); border: none; color: #fff; width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; }
  .send-btn:disabled { opacity: 0.3; }
  .empty { text-align: center; margin: auto; opacity: 0.5; }
  .empty h2 { font-size: 32px; margin-bottom: 16px; }
  .menu-btn { display: none; }
    @media (max-width: 768px) {
    .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; z-index: 100; transition: left 0.2s; }
    .sidebar.open { left: 0; }
    .menu-btn { display: flex; }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="sidebar" id="sidebar">
    <button class="new-chat" id="newChatBtn">+ New chat</button>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">ZEEZA v5<br>ZEEZA_LABS © 2026<br>100% Free</div>
  </div>
  <div class="main">
    <div class="header">
      <button class="icon-btn menu-btn" id="menuBtn">☰</button>
      <h1>ZEEZA</h1>
      <div class="header-btns">
        <button class="icon-btn" id="voiceBtn" title="Voice">🎤</button>
        <button class="icon-btn" id="searchBtn" title="Search">🔍</button>
        <button class="icon-btn" id="themeBtn" title="Theme">🌓</button>
        <button class="icon-btn" id="exportBtn" title="Export">💾</button>
      </div>
    </div>
    <div class="chat" id="chat">
      <div class="empty">
        <h2>ZEEZA</h2>
        <p>Chat, search web, generate images, analyze files. All free.</p>
      </div>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="userInput" placeholder="Message ZEEZA..." rows="1"></textarea>
        <button class="icon-btn" id="fileBtn" title="Upload">📎</button>
        <button class="icon-btn" id="imgBtn" title="Generate Image">🎨</button>
        <button class="send-btn" id="sendBtn" title="Send">↑</button>
      </div>
    </div>
  <input type="file" id="fileInput" style="display:none" accept="image/*,.pdf,.txt,.js,.py,.html,.css,.json">

  <script>
    const DOM = {
      sidebar: document.getElementById('sidebar'),
      chat: document.getElementById('chat'),
      chatList: document.getElementById('chatList'),
      input: document.getElementById('userInput'),
      sendBtn: document.getElementById('sendBtn'),
      fileInput: document.getElementById('fileInput'),
      newChatBtn: document.getElementById('newChatBtn'),
      menuBtn: document.getElementById('menuBtn'),
      voiceBtn: document.getElementById('voiceBtn'),
      searchBtn: document.getElementById('searchBtn'),
      themeBtn: document.getElementById('themeBtn'),
      exportBtn: document.getElementById('exportBtn'),
      fileBtn: document.getElementById('fileBtn'),
      imgBtn: document.getElementById('imgBtn')
    };

    let chats = JSON.parse(localStorage.getItem('zeeza_chats_v5') || '[]');
    let currentId = null;
    let messages = [];
    let fileContext = null;
    let recognition, listening = false;

    marked.setOptions({ highlight: (code) => { try { return hljs.highlightAuto(code).value; } catch { return code; } } });

    // Bind all events safely
    DOM.newChatBtn.addEventListener('click', newChat);
    DOM.menuBtn.addEventListener('click', () => DOM.sidebar.classList.toggle('open'));
    DOM.sendBtn.addEventListener('click', sendMsg);
    DOM.fileBtn.addEventListener('click', () => DOM.fileInput.click());
    DOM.imgBtn.addEventListener('click', () => {
      const prompt = prompt('Image prompt:');
      if (prompt) handleImagine(prompt);
    });
    DOM.voiceBtn.addEventListener('click', toggleVoice);
    DOM.searchBtn.addEventListener('click', () => {
      const query = prompt('Search web:');
      if (query) doSearch(query);
    });
    DOM.themeBtn.addEventListener('click', toggleTheme);
    DOM.exportBtn.addEventListener('click', exportChat);
    DOM.fileInput.addEventListener('change', handleFile);
    DOM.input.addEventListener('keydown', e => {
      if (e.key === 'Enter' &&!e.shiftKey) { e.preventDefault(); sendMsg(); }
    });
    DOM.input.addEventListener('input', e => {
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
    });

    // Close sidebar on chat click mobile
    DOM.chat.addEventListener('click', () => {
      if (window.innerWidth <= 768) DOM.sidebar.classList.remove('open');
    });

    window.addEventListener('load', () => {
      loadChats();
      if (chats.length > 0) loadChat(chats[0].id);
      else newChat();
    });

    function newChat() {
      currentId = Date.now().toString();
      messages = [];
      fileContext = null;
      DOM.chat.innerHTML = '<div class="empty"><h2>ZEEZA</h2><p>Chat, search web, generate images, analyze files. All free.</p></div>';
      saveChat();
      loadChats();
      DOM.sidebar.classList.remove('open');
    }

    function saveChat() {
      if (messages.length === 0) return;
      const title = messages.find(m => m.role === 'user')?.content.substring(0, 30) || 'New Chat';
      const idx = chats.findIndex(c => c.id === currentId);
      const data = { id: currentId, title, messages, updated: Date.now() };
      if (idx >= 0) chats[idx] = data; else chats.unshift(data);
      localStorage.setItem('zeeza_chats_v5', JSON.stringify(chats));
    }

    function loadChats() {
      DOM.chatList.innerHTML = '';
      chats.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'chat-item' + (c.id === currentId? ' active' : '');
        btn.textContent = c.title;
        btn.addEventListener('click', () => loadChat(c.id));
        DOM.chatList.appendChild(btn);
      });
    }

    function loadChat(id) {
      const chat = chats.find(c => c.id === id);
      if (!chat) return;
      currentId = id;
      messages = chat.messages || [];
      DOM.chat.innerHTML = '';
      messages.forEach(m => addMsg(m.content, m.role));
      loadChats();
      DOM.sidebar.classList.remove('open');
    }

    function addMsg(content, role) {
      if (DOM.chat.querySelector('.empty')) DOM.chat.innerHTML = '';
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;
      const safeContent = role === 'ai'? marked.parse(content) : content.replace(/</g, '&lt;').replace(/\n/g, '<br>');
      msg.innerHTML = `<div class="avatar ${role}">${role === 'user'? 'U' : 'Z'}</div><div class="msg-content">${safeContent}</div>`;
      DOM.chat.appendChild(msg);
      DOM.chat.scrollTop = DOM.chat.scrollHeight;

      msg.querySelectorAll('pre code').forEach(block => {
        if (block.parentElement.querySelector('.copy-code')) return;
        const btn = document.createElement('button');
        btn.className = 'copy-code';
        btn.textContent = 'Copy';
        btn.addEventListener('click', () => navigator.clipboard.writeText(block.textContent));
        block.parentElement.appendChild(btn);
      });
    }

    async function sendMsg() {
      const text = DOM.input.value.trim();
      if (!text &&!fileContext) return;

      let userMsg = text;
      if (fileContext) userMsg = `[File: ${fileContext.name}]\n${text}`;

      addMsg(userMsg, 'user');
      messages.push({ role: 'user', content: userMsg });
      DOM.input.value = '';
      DOM.input.style.height = 'auto';
      DOM.sendBtn.disabled = true;

      let context = `You are ZEEZA v5 by ZEEZA_LABS. You have web search. Be helpful.\n\n`;
      if (fileContext) context += `File: ${fileContext.name}\n${fileContext.text.substring(0, 4000)}\n\n`;
      context += messages.slice(-8).map(m => `${m.role}: ${m.content}`).join('\n');

      try {
        const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(context)}`);
        if (!res.ok) throw new Error('Network');
        const reply = await res.text();
        addMsg(reply, 'ai');
        messages.push({ role: 'assistant', content: reply });
        if (listening) speechSynthesis.speak(new SpeechSynthesisUtterance(reply.replace(/[#*`_]/g, '').substring(0, 200)));
      } catch (e) {
        addMsg('Error: Could not reach AI. Check connection.', 'ai');
      }

      DOM.sendBtn.disabled = false;
      fileContext = null;
      saveChat();
    }

    async function doSearch(query) {
      addMsg(`Searching: ${query}`, 'ai');
      messages.push({ role: 'user', content: `Search: ${query}` });

      try {
        const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`);
        const data = await res.json();
        let results = '';
        let count = 1;

        if (data.AbstractText) {
          results += `[${count}] ${data.AbstractText} Source: ${data.AbstractURL}\n\n`;
          count++;
        }
        if (data.RelatedTopics) {
          data.RelatedTopics.slice(0, 4).forEach(t => {
            if (t.Text && t.FirstURL) {
              results += `[${count}] ${t.Text} Source: ${t.FirstURL}\n\n`;
              count++;
            }
          });
        }

        if (!results) results = `No results found. Using knowledge base.`;

        messages.push({ role: 'system', content: `Web results: ${results}` });
        await sendMsgWithContext(results);
      } catch (e) {
        addMsg('Search failed. Answering from knowledge.', 'ai');
        await sendMsgWithContext('');
      }
    }

    async function sendMsgWithContext(webContext) {
      let context = `You are ZEEZA. Answer using web search results below. Cite as [1][2].\n\nWeb Results:\n${webContext}\n\nConversation:\n`;
      context += messages.slice(-6).map(m => `${m.role}: ${m.content}`).join('\n');

      try {
        const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(context)}`);
        const reply = await res.text();
        addMsg(reply, 'ai');
        messages.push({ role: 'assistant', content: reply });
      } catch (e) {
        addMsg('Error generating answer.', 'ai');
      }
      saveChat();
    }

    function handleImagine(prompt) {
      const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true`;
      addMsg(`![${prompt}](${url})`, 'ai');
      messages.push({ role: 'assistant', content: `Generated image: ${prompt}` });
      saveChat();
    }

    function toggleTheme() {
      const theme = document.body.dataset.theme === 'dark'? 'light' : 'dark';
      document.body.dataset.theme = theme;
    }

    function toggleVoice() {
      if (!('webkitSpeechRecognition' in window)) return alert('Voice not supported on this browser');
      if (listening) {
        recognition.stop();
        listening = false;
        DOM.voiceBtn.style.background = '';
      } else {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.onresult = e => {
          DOM.input.value = e.results[0][0].transcript;
          sendMsg();
        };
        recognition.onend = () => { listening = false; DOM.voiceBtn.style.background = ''; };
        recognition.start();
        listening = true;
        DOM.voiceBtn.style.background = 'var(--accent)';
      }
    }

    function exportChat() {
      const data = JSON.stringify(messages, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `zeeza-chat-${currentId}.json`;
      a.click();
    }

    async function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = file.type.startsWith('image/')? 'Image uploaded. Ask me about it.' : await file.text();
        fileContext = { name: file.name, text: text.substring(0, 10000) };
        addMsg(`📎 File attached: ${file.name}`, 'ai');
        messages.push({ role: 'user', content: `[File: ${file.name}]` });
      } catch (err) {
        addMsg('Error reading file', 'ai');
      }
    }
  </script>
</body>
</html>
